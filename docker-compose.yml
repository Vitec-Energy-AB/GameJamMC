services:
  game:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: "${PORT:-3000}"
      CORS_ORIGIN: "${CORS_ORIGIN:-*}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
